<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>ส่งรูปงาน</title>
  <style>
    body {
      font-family: "Leelawadee UI", "Tahoma", sans-serif;
      margin: 0; padding: 1.5rem;
      background: #ecfdf5; color: #064e3b;
      font-size: 1.3rem; line-height: 1.55;
    }
    h1 { font-size: 1.8rem; margin: 0 0 1rem; }
    .step {
      background: #fff; border-radius: 16px;
      padding: 1.25rem; margin: 0.85rem 0;
      border: 2px solid #99f6e4;
    }
    .n {
      display: inline-block; width: 2rem; height: 2rem;
      line-height: 2rem; text-align: center;
      border-radius: 999px; background: #0d9488; color: #fff;
      font-weight: 800; margin-right: 0.5rem;
    }
  </style>
</head>
<body>
  <h1>ส่งรูปยังไง?</h1>
  <div class="step"><span class="n">1</span> ปิดหน้านี้ กลับไปแชท</div>
  <div class="step"><span class="n">2</span> ส่งรูปได้ <strong>หลายใบ</strong> (ก่อน / หลัง / เพิ่มเติม)</div>
  <div class="step"><span class="n">3</span> กดปุ่มว่ารูปนั้นเป็นอะไร</div>
  <div class="step"><span class="n">4</span> พิมพ์ <strong>ส่งงานเสร็จ</strong></div>
  <p style="margin-top:1.5rem">รูปจะถูกเก็บใน Google Drive ของบริษัทอัตโนมัติ</p>
</body>
</html>
