<!DOCTYPE html>
<html lang="th">
<head>
    <link rel="icon" type="image/png" href="../logo.png?v=2">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{page_title}}</title>
    <meta name="description" content="{{description}}">
    <link rel="canonical" href="{{canonical}}">
    <meta property="og:type" content="article">
    <meta property="og:title" content="{{page_title}}">
    <meta property="og:description" content="{{description}}">
    <meta property="og:url" content="{{canonical}}">
    <meta property="og:image" content="{{image}}">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{page_title}}">
    <meta name="twitter:description" content="{{description}}">
    <meta name="twitter:image" content="{{image}}">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {{organization_schema}},
        {
          "@type": "BlogPosting",
          "@id": "{{canonical}}#article",
          "headline": "{{title}}",
          "description": "{{description}}",
          "image": "{{image}}",
          "datePublished": "{{date}}",
          "dateModified": "{{date_modified}}",
          "wordCount": {{word_count}},
          "mainEntityOfPage": { "@type": "WebPage", "@id": "{{canonical}}" },
          "author": { "@id": "{{organization_id}}" },
          "publisher": { "@id": "{{organization_id}}" }
        },
        {{breadcrumb_schema}},
        {{faq_schema}}
      ]
    }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+Thai:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="../style.css?v=20260712">
    <style>
        .post-shell { max-width: 880px; margin: 0 auto; padding: 2rem 1rem 4rem; }
        .breadcrumb { font-size: .9rem; margin: 1rem 0 1.5rem; color: #64748b; }
        .breadcrumb a { color: #0d9488; text-decoration: none; }
        .post-category { color: #0d9488; font-weight: 700; }
        .post-meta { color: #64748b; font-size: .92rem; margin-bottom: 1.5rem; }
        .post-cover { width: 100%; height: auto; border-radius: 16px; margin: 1rem 0 2rem; }
        .post-content { line-height: 1.9; color: #334155; }
        .post-content img { max-width: 100%; height: auto; border-radius: 12px; }
        .post-content h2, .post-content h3 { color: #0f172a; margin-top: 2rem; }
        .related-posts { margin-top: 3rem; padding-top: 2rem; border-top: 1px solid #e2e8f0; }
        .related-grid { display: grid; gap: 1rem; }
        .related-card { display: flex; gap: 1rem; align-items: center; color: inherit; text-decoration: none; }
        .related-card img { object-fit: cover; border-radius: 8px; }
    </style>
    {{analytics_script}}
</head>
<body>
    <header class="navbar">
        <div class="container">
            <a href="../index.html" class="logo"><img src="../logo.png" alt="Sangkan Clean" width="180" height="80" style="height:45px;margin-right:8px;"><span>Sangkan<span> Clean</span></span></a>
            <nav class="nav-menu" id="navMenu">
                <a href="../index.html#services" class="nav-link">บริการ</a>
                <a href="../blog.html" class="nav-link">บทความ</a>
                <a href="../index.html#quote" class="btn btn-primary nav-cta">ขอใบเสนอราคา</a>
            </nav>
            <button class="menu-toggle" id="menuToggle" aria-label="เมนู"><i class="fa-solid fa-bars"></i></button>
        </div>
    </header>
    <main class="post-shell">
        <nav class="breadcrumb" aria-label="เส้นทางนำทาง"><a href="../index.html">หน้าแรก</a> / <a href="../blog.html">บทความ</a> / <span>{{title}}</span></nav>
        <article>
            <p class="post-category">{{category}}</p>
            <h1>{{title}}</h1>
            <p class="post-meta"><time datetime="{{date}}">{{date}}</time> · {{word_count}} คำ</p>
            <img class="post-cover" src="{{image}}" alt="{{title}}" width="1200" height="675" fetchpriority="high">
            <div class="post-content">{{content}}</div>
            {{related_posts}}
        </article>
    </main>
    <footer class="footer" style="background:#0f172a;padding:3rem 0;color:#cbd5e1;text-align:center;"><p>&copy; 2026 Sangkan Clean | <a href="../index.html" style="color:#0d9488;">บริการทำความสะอาด</a></p></footer>
    <script src="../tracking.js"></script>
    <script>
        const menuToggle = document.getElementById('menuToggle');
        const navMenu = document.getElementById('navMenu');
        if (menuToggle && navMenu) menuToggle.addEventListener('click', () => navMenu.classList.toggle('active'));
    </script>
</body>
</html>
