<!DOCTYPE html>
<html lang="th">
<head>
    <link rel="icon" type="image/png" href="logo.png?v=2">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บทความ | Sangkan Clean</title>
    <meta name="description" content="บทความความรู้เกี่ยวกับการทำความสะอาด เคล็ดลับ และคำแนะนำจากผู้เชี่ยวชาญ Sangkan Clean">
    <link rel="canonical" href="https://www.sangkanclean.com/blog.html">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+Thai:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .blog-hero { background: linear-gradient(135deg, #0f172a 0%, #0d9488 100%); padding: 6rem 0 3rem; text-align: center; color: white; }
        .blog-hero h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 1rem; }
        .blog-toolbar { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; margin-top: 1.5rem; max-width: 600px; margin-left: auto; margin-right: auto; }
        .blog-search { flex: 1; min-width: 220px; padding: 0.75rem 1rem; border: none; border-radius: 99px; font-size: 1rem; }
        .blog-grid-section { padding: 3rem 0 4rem; background: #f8fafc; }
        .blog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; margin-top: 1.5rem; }
        .blog-card { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.07); transition: transform 0.3s; text-decoration: none; color: inherit; display: block; }
        .blog-card:hover { transform: translateY(-4px); }
        .blog-card-img { width: 100%; height: 180px; object-fit: cover; }
        .blog-card-body { padding: 1.25rem; }
        .blog-card-tag { display: inline-block; background: rgba(13,148,136,0.1); color: #0d9488; font-size: 0.75rem; font-weight: 700; padding: 0.25rem 0.7rem; border-radius: 99px; }
        .blog-card-title { font-size: 1.05rem; font-weight: 700; margin: 0.75rem 0; line-height: 1.5; color: #0f172a; }
        .blog-card-desc { font-size: 0.88rem; color: #64748b; line-height: 1.6; margin-bottom: 0.75rem; }
        .pagination { display: flex; justify-content: center; gap: 0.5rem; margin-top: 2rem; flex-wrap: wrap; }
        .pagination button { padding: 0.5rem 1rem; border: 1px solid #e2e8f0; background: white; border-radius: 8px; cursor: pointer; }
        .pagination button.active { background: #0d9488; color: white; border-color: #0d9488; }
        .pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
        .blog-count { text-align: center; color: #64748b; margin-top: 1rem; font-size: 0.9rem; }
    </style>
    <script async src="https://www.googletagmanager.com/gtag/js?id=AW-18299765093"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','AW-18299765093');</script>
</head>
<body>
    <header class="navbar">
        <div class="container">
            <a href="index.html" class="logo"><img src="logo.png" alt="Sangkan Clean" style="height:45px;margin-right:8px;"><span>Sangkan<span> Clean</span></span></a>
            <nav class="nav-menu" id="navMenu">
                <a href="index.html#services" class="nav-link">บริการของเรา</a>
                <a href="index.html#calculator" class="nav-link">คำนวณราคา</a>
                <a href="index.html#faq" class="nav-link">FAQ</a>
                <a href="blog.html" class="nav-link" style="color:var(--primary);font-weight:700;">บทความ</a>
                <a href="index.html#quote" class="btn btn-primary nav-cta">ขอใบเสนอราคา</a>
            </nav>
            <button class="menu-toggle" id="menuToggle" aria-label="เมนู"><i class="fa-solid fa-bars"></i></button>
        </div>
    </header>

    <section class="blog-hero">
        <div class="container">
            <h1>บทความน่ารู้<br>เกี่ยวกับการทำความสะอาด</h1>
            <p>เคล็ดลับและความรู้จากผู้เชี่ยวชาญ Sangkan Clean</p>
            <div class="blog-toolbar">
                <input type="search" id="blogSearch" class="blog-search" placeholder="ค้นหาบทความ..." aria-label="ค้นหาบทความ">
            </div>
        </div>
    </section>

    <section class="blog-grid-section">
        <div class="container">
            <div class="blog-grid" id="blogGrid"><p style="text-align:center;grid-column:1/-1;">กำลังโหลด...</p></div>
            <p class="blog-count" id="blogCount"></p>
            <div class="pagination" id="pagination"></div>
        </div>
    </section>

    <div class="floating-contacts">
        <a href="tel:0636865134" class="float-btn float-phone" aria-label="โทรเลย"><i class="fa-solid fa-phone"></i></a>
        <a href="https://line.me/ti/p/@sangkanclean" target="_blank" rel="noopener" class="float-btn float-line" aria-label="Line"><i class="fa-brands fa-line"></i></a>
    </div>

    <script src="tracking.js"></script>
    <script>
        const PER_PAGE = 12;
        let allPosts = [];
        let filtered = [];
        let currentPage = 1;

        const blogGrid = document.getElementById('blogGrid');
        const pagination = document.getElementById('pagination');
        const blogSearch = document.getElementById('blogSearch');
        const blogCount = document.getElementById('blogCount');

        fetch('posts.json')
            .then(r => r.json())
            .then(data => {
                allPosts = data.slice().reverse();
                filtered = allPosts;
                render();
            })
            .catch(() => { blogGrid.innerHTML = '<p style="text-align:center;grid-column:1/-1;">ไม่สามารถโหลดบทความได้</p>'; });

        blogSearch.addEventListener('input', () => {
            const q = blogSearch.value.trim().toLowerCase();
            filtered = q ? allPosts.filter(p =>
                (p.title + p.description + (p.category||'')).toLowerCase().includes(q)
            ) : allPosts;
            currentPage = 1;
            render();
        });

        function render() {
            const start = (currentPage - 1) * PER_PAGE;
            const pagePosts = filtered.slice(start, start + PER_PAGE);

            if (!pagePosts.length) {
                blogGrid.innerHTML = '<p style="text-align:center;grid-column:1/-1;">ไม่พบบทความ</p>';
                pagination.innerHTML = '';
                blogCount.textContent = '';
                return;
            }

            blogGrid.innerHTML = pagePosts.map(post => {
                const slug = post.slug || 'post';
                return `<a href="blog/${slug}.html" class="blog-card">
                    <img src="${post.image}" alt="${post.title}" class="blog-card-img" loading="lazy" width="400" height="180">
                    <div class="blog-card-body">
                        <span class="blog-card-tag">${post.category || 'บทความ'}</span>
                        <h2 class="blog-card-title">${post.title}</h2>
                        <p class="blog-card-desc">${post.description}</p>
                        <span style="font-size:0.78rem;color:#94a3b8;"><i class="fa-regular fa-calendar"></i> ${post.date}</span>
                    </div>
                </a>`;
            }).join('');

            const totalPages = Math.ceil(filtered.length / PER_PAGE);
            blogCount.textContent = `แสดง ${start + 1}-${start + pagePosts.length} จาก ${filtered.length} บทความ`;
            renderPagination(totalPages);
        }

        function renderPagination(totalPages) {
            if (totalPages <= 1) { pagination.innerHTML = ''; return; }
            let html = `<button ${currentPage===1?'disabled':''} onclick="goPage(${currentPage-1})">ก่อนหน้า</button>`;
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || Math.abs(i - currentPage) <= 2) {
                    html += `<button class="${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
                } else if (Math.abs(i - currentPage) === 3) {
                    html += '<span>...</span>';
                }
            }
            html += `<button ${currentPage===totalPages?'disabled':''} onclick="goPage(${currentPage+1})">ถัดไป</button>`;
            pagination.innerHTML = html;
        }

        window.goPage = function(p) {
            currentPage = p;
            render();
            window.scrollTo({ top: document.querySelector('.blog-grid-section').offsetTop - 80, behavior: 'smooth' });
        };

        const menuToggle = document.getElementById('menuToggle');
        const navMenu = document.getElementById('navMenu');
        if (menuToggle) menuToggle.addEventListener('click', () => navMenu.classList.toggle('active'));
    </script>
</body>
</html>
